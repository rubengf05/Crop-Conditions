[[redirects]]
  from = "/nass-api"
  to = "https://quickstats.nass.usda.gov/api/api_GET/"
  status = 200
  force = true

[[redirects]]
  from = "/nass-api/*"
  to = "https://quickstats.nass.usda.gov/api/api_GET/:splat"
  status = 200
  force = true
  
[[redirects]]
  from = "/nass-counts"
  to = "https://quickstats.nass.usda.gov/api/get_counts/"
  status = 200
  force = true
[[redirects]]
  from = "/nass-params"
  to = "https://quickstats.nass.usda.gov/api/get_param_values/"
  status = 200
  force = true
